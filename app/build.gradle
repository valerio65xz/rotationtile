plugins {
    id 'com.android.application'
}

android {
    namespace = 'com.example.rotationtile'
    compileSdk 36

    defaultConfig {
        applicationId "com.example.rotationtile"
        minSdk 24
        targetSdk 36
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.1'
}
